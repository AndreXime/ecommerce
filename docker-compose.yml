services:
  api:
    build:
      context: ./api
      target: runner
    container_name: api-ecommerce
    restart: always
    ports:
      - "${API_PORTS}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENV: ${API_ENV}
      PORT: ${API_LISTEN_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_BUCKET: ${MINIO_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      EMAIL_SERVICE_HOST: ${EMAIL_SERVICE_HOST}
      EMAIL_SERVICE_PORT: ${MAILPIT_SMTP_CONTAINER_PORT}
    depends_on:
      db:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${PORT}/health/check || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ./web
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL}
    container_name: web-ecommerce
    restart: always
    ports:
      - "${WEB_PORTS}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4321/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16
    container_name: db-ecommerce
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-migrate:
    build:
      context: ./api
      target: migrate
    container_name: api-migrate-ecommerce
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api-seed:
    profiles:
      - seed
    build:
      context: ./api
      target: seed
    container_name: api-seed-ecommerce
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_BUCKET: ${MINIO_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      EMAIL_SERVICE_PORT: ${MAILPIT_SMTP_CONTAINER_PORT}
    depends_on:
      db:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: minio-ecommerce
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_HOST_BIND}:${MINIO_API_PORT}:9000"
      - "${MINIO_HOST_BIND}:${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup-ecommerce
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio-cors.xml:/config/cors.xml:ro
      - ./docker/setup-minio.sh:/setup-minio.sh:ro
    environment:
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: ["/bin/sh", "/setup-minio.sh"]

  redis:
    image: redis:alpine
    container_name: redis-ecommerce
    restart: always
    ports:
      - "${REDIS_PORTS}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: mailpit-ecommerce
    restart: always
    ports:
      - "${MAILPIT_SMTP_HOST_PORT}:${MAILPIT_SMTP_CONTAINER_PORT}"
      - "${MAILPIT_UI_HOST_PORT}:${MAILPIT_UI_CONTAINER_PORT}"
    environment:
      MP_MAX_MESSAGES: ${MAILPIT_MAX_MESSAGES}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:${MAILPIT_UI_CONTAINER_PORT}/livez || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: prometheus-ecommerce
    restart: always
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - "./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.1.1
    container_name: grafana-ecommerce
    restart: always
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - "./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro"
      - "./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro"
      - "./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro"
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  minio_data:
  pgdata:
  redis_data:
  grafana_data:
