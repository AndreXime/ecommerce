services:
  api:
    build:
      context: ./api
      target: runner
    container_name: api-ecommerce
    restart: always
    ports:
      - "${API_PORTS}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENV: ${API_ENV}
      PORT: ${API_LISTEN_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_BUCKET: ${MINIO_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      EMAIL_SERVICE_HOST: ${EMAIL_SERVICE_HOST}
      EMAIL_SERVICE_PORT: ${EMAIL_SERVICE_PORT}
    depends_on:
      db:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
      redis:
        condition: service_started
      mailpit:
        condition: service_started

  web:
    build:
      context: ./web
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL}
    container_name: web-ecommerce
    restart: always
    ports:
      - "${WEB_PORTS}"
    depends_on:
      - api

  db:
    image: postgres:16
    container_name: db-ecommerce
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-migrate:
    build:
      context: ./api
      target: migrate
    container_name: api-migrate-ecommerce
    environment:
      DATABASE_URL: ${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: minio-ecommerce
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_HOST_BIND}:${MINIO_API_PORT}:9000"
      - "${MINIO_HOST_BIND}:${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio-init-ecommerce
    depends_on:
      - minio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} 2>/dev/null; do sleep 1; done
        mc mb local/${MINIO_BUCKET} --ignore-existing

  redis:
    image: redis:alpine
    container_name: redis-ecommerce
    restart: always
    ports:
      - "${REDIS_PORTS}"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit
    container_name: mailpit-ecommerce
    restart: always
    ports:
      - "${MAILPIT_SMTP_PORTS}"
      - "${MAILPIT_UI_PORTS}"
    environment:
      MP_MAX_MESSAGES: ${MAILPIT_MAX_MESSAGES}

  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: prometheus-ecommerce
    restart: always
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - "./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:12.1.1
    container_name: grafana-ecommerce
    restart: always
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - "./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro"
      - "./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro"
      - "./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro"
      - grafana_data:/var/lib/grafana

volumes:
  minio_data:
  pgdata:
  redis_data:
  grafana_data:
